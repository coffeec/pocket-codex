<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=0.5, maximum-scale=3, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#101311">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PocketCodex">
  <title>PocketCodex</title>
  <link rel="manifest" href="/manifest.webmanifest" crossorigin="use-credentials">
  <link rel="icon" href="/icon-192.png" sizes="192x192" type="image/png">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <div class="app-shell" id="app">
    <aside class="sidebar" id="sidebar" aria-label="会话列表">
      <div class="sidebar-head">
        <div class="brand-mark" aria-hidden="true">C</div>
        <div class="brand-copy">
          <strong>PocketCodex</strong>
          <span id="providerLabel">正在连接</span>
        </div>
        <button class="icon-button sidebar-close" id="closeSidebar" type="button" aria-label="关闭会话列表" title="关闭">×</button>
      </div>
      <button class="new-chat-button" id="newChatButton" type="button"><span aria-hidden="true">＋</span> 新会话</button>
      <nav class="conversation-list" id="conversationList" aria-label="历史会话"></nav>
      <div class="sidebar-foot">
        <span class="service-indicator" id="sidebarIndicator" aria-hidden="true"></span>
        <span id="sidebarStatus">等待状态</span>
        <span class="sidebar-port">TTYD :7681</span>
      </div>
    </aside>

    <button class="sidebar-scrim" id="sidebarScrim" type="button" aria-label="关闭会话列表"></button>

    <main class="main-panel">
      <header class="topbar">
        <button class="icon-button menu-button" id="openSidebar" type="button" aria-label="打开会话列表" title="会话列表">☰</button>
        <div class="topbar-title">
          <strong id="conversationTitle">新会话</strong>
          <span id="modelLabel">加载模型中</span>
        </div>
        <button class="icon-button density-button" id="densityToggle" type="button" aria-label="切换紧凑显示" title="紧凑显示">A-</button>
        <button class="icon-button" id="refreshStatus" type="button" aria-label="刷新系统状态" title="刷新状态">↻</button>
      </header>

      <section class="status-grid is-loading" id="statusGrid" aria-label="服务器状态">
        <div class="status-item">
          <span class="status-label">CPU</span>
          <strong id="cpuValue">--</strong>
          <small id="cpuMeta">正在读取</small>
        </div>
        <div class="status-item">
          <span class="status-label">内存</span>
          <strong id="memoryValue">--</strong>
          <small id="memoryMeta">正在读取</small>
        </div>
        <div class="status-item">
          <span class="status-label">系统盘</span>
          <strong id="diskValue">--</strong>
          <small id="diskMeta">正在读取</small>
        </div>
        <div class="status-item">
          <span class="status-label">电池</span>
          <strong id="batteryValue">--</strong>
          <small id="batteryMeta">正在读取</small>
        </div>
        <div class="status-item services-item">
          <span class="status-label">服务</span>
          <div class="services" id="servicesValue">
            <span><i></i>Pal</span><span><i></i>FRP</span><span><i></i>API</span>
          </div>
          <small id="statusTime">正在读取</small>
        </div>
      </section>

      <section class="chat-region" id="chatRegion" aria-live="polite">
        <div class="chat-content" id="chatContent">
          <div class="empty-state" id="emptyState">
            <div class="empty-symbol" aria-hidden="true">›_</div>
            <h1>现在需要检查什么？</h1>
            <div class="quick-actions" id="quickActions">
              <button type="button" data-prompt="检查笔记本、帕鲁和 frp 当前状态">检查服务器状态</button>
              <button type="button" data-prompt="分析最近的帕鲁日志，判断是否有崩溃、内存不足或异常掉线">分析帕鲁日志</button>
              <button type="button" data-prompt="查看 CPU 温度、频率、内存余量和系统盘空间，并指出异常">检查资源余量</button>
            </div>
          </div>
          <div class="message-list" id="messageList"></div>
        </div>
      </section>

      <footer class="composer-wrap">
        <form class="composer" id="composer">
          <textarea id="promptInput" rows="1" maxlength="8000" placeholder="给服务器助手发送消息" aria-label="消息"></textarea>
          <button class="send-button" id="sendButton" type="submit" aria-label="发送" title="发送">↑</button>
          <button class="stop-button" id="stopButton" type="button" aria-label="停止任务" title="停止任务">■</button>
        </form>
        <div class="composer-meta"><span id="runState">就绪</span><span id="characterCount">0 / 8000</span></div>
      </footer>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="/app.js" defer></script>
</body>
</html>
