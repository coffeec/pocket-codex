services:
  codex-web:
    image: pocket-codex:local
    build:
      context: .
    container_name: codex-web
    restart: unless-stopped
    environment:
      WEB_USER: admin
      WEB_PORT: "7682"
      CODEX_WEB_DATA: /home/node/.codex-web
      HOSTCTL_PATH: /usr/local/bin/hostctl
      SUB2API_BASE_URL: http://sub2api:8080/v1
      SUB2API_HEALTH_URL: http://sub2api:8080/health
    secrets:
      - web_password
    volumes:
      - ./data/codex:/home/node/.codex:ro
      - ./data/codex-web:/home/node/.codex-web
      - ./data/ssh:/home/node/.ssh:ro
    ports:
      - "127.0.0.1:7682:7682"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sub2api_net
    cap_drop:
      - ALL
    read_only: true
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 768m
    cpus: 1.5
    tmpfs:
      - /tmp:size=256m,mode=1777
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:7682/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

secrets:
  web_password:
    file: ./secrets/web_password.txt

networks:
  sub2api_net:
    external: true
    name: ${SUB2API_NETWORK:?Set SUB2API_NETWORK in .env}
